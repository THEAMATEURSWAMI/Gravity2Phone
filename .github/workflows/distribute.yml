name: Build & Distribute
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create google-services.json
        shell: python
        run: |
          import base64
          import os
          import sys

          secret = os.environ.get("SECRET_DATA", "").strip()
          if not secret:
              print("Error: GOOGLE_SERVICES_JSON secret is empty")
              sys.exit(1)
          
          try:
              if secret.startswith("{"):
                  data = secret.encode("utf-8")
                  print("Detected raw JSON format")
              else:
                  secret = "".join(secret.split())
                  data = base64.b64decode(secret, validate=True)
                  print("Detected base64 format")
              
              os.makedirs("app/android/app", exist_ok=True)
              with open("app/android/app/google-services.json", "wb") as f:
                  f.write(data)
              print("Successfully created google-services.json")
          except Exception as e:
              print(f"Error processing secret: {e}")
              # Fallback: maybe it's partially corrupted or weirdly formatted, try without validate
              try:
                  data = base64.b64decode(secret)
                  with open("app/android/app/google-services.json", "wb") as f:
                      f.write(data)
                  print("Created using fallback base64")
              except:
                  sys.exit(1)
        env:
          SECRET_DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: |
          cd app
          flutter pub get
          
      - name: Build APK
        run: |
          cd app
          flutter build apk --debug
          
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/app/outputs/flutter-apk/app-debug.apk --app 1:304820269242:android:cf6228313dca45d6c5d283 --testers "noless42@gmail.com"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON || secrets.FIREBASE_SERVICE_ACCOUNT }}
