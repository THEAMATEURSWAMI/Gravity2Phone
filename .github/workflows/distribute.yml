name: Build & Distribute
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create google-services.json
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "Error: GOOGLE_SERVICES_JSON secret is empty or not set"
            exit 1
          fi
          printf "%s" "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/android/app/google-services.json
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: |
          cd app
          flutter pub get
          
      - name: Build APK
        run: |
          cd app
          flutter build apk --debug
          
      - name: Sanitize Firebase Token
        id: sanitize
        run: |
          CLEAN_TOKEN=$(echo "${{ secrets.FIREBASE_TOKEN }}" | tr -d '\r\n ')
          echo "::add-mask::$CLEAN_TOKEN"
          echo "token=$CLEAN_TOKEN" >> $GITHUB_OUTPUT

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/app/outputs/flutter-apk/app-debug.apk --app 1:304820269242:android:30bef8012fca7576c5d283 --testers "noless42@gmail.com"
        env:
          FIREBASE_TOKEN: ${{ steps.sanitize.outputs.token }}
