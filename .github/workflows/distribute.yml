name: Build & Distribute
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create google-services.json
        shell: python
        run: |
          import base64, os, sys

          raw_secret = os.environ.get("GOOGLE_SERVICES_JSON_RAW", "").strip()
          if not raw_secret:
              print("::error::GOOGLE_SERVICES_JSON secret is empty")
              sys.exit(1)
          
          try:
              # Handle raw JSON
              if raw_secret.startswith("{"):
                  data = raw_secret.encode("utf-8")
                  print("Format: Raw JSON detected")
              # Handle Base64
              else:
                  clean_b64 = "".join(raw_secret.split())
                  data = base64.b64decode(clean_b64)
                  print("Format: Base64 detected")
              
              os.makedirs("app/android/app", exist_ok=True)
              with open("app/android/app/google-services.json", "wb") as f:
                  f.write(data)
              print("Outcome: google-services.json written successfully")
          except Exception as e:
              print(f"::error::Failed to process secret: {e}")
              sys.exit(1)
        env:
          GOOGLE_SERVICES_JSON_RAW: ${{ secrets.GOOGLE_SERVICES_JSON }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: |
          cd app
          flutter pub get
          
      - name: Build APK
        run: |
          cd app
          flutter build apk --debug
          
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/app/outputs/flutter-apk/app-debug.apk --app 1:304820269242:android:cf6228313dca45d6c5d283 --testers "noless42@gmail.com"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON || secrets.FIREBASE_SERVICE_ACCOUNT }}
