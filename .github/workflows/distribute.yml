name: Build & Distribute
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create google-services.json
        run: |
          mkdir -p app/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | tr -d ' \n\r' > decoded.txt
          base64 -d decoded.txt > app/android/app/google-services.json
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: |
          cd app
          flutter pub get
          
      - name: Build APK
        run: |
          cd app
          flutter build apk --debug
          
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/app/outputs/flutter-apk/app-debug.apk --app 1:304820269242:android:cf6228313dca45d6c5d283 --testers "noless42@gmail.com"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON || secrets.FIREBASE_SERVICE_ACCOUNT }}
