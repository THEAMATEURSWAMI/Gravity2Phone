name: Build & Distribute
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.7'
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          cd app
          flutter pub get
          
      - name: Build APK
        run: |
          cd app
          flutter build apk --debug
          
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/app/outputs/flutter-apk/app-debug.apk --app 1:304820269242:android:cf6228313dca45d6c5d283 --testers "noless42@gmail.com"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
